<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./CSS/lider.css">
    <link rel="icon" href="./Img/favicon.ico" />
    <title>Líder | ConnectPolo</title>
</head>

<body>
    <main>
        <section class="s-perfil">
            <div class="d-informacoes-lider">
                <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="img-lider" height="50" alt="">
                <div class="d-informacoes-texto">
                    <!-- <h1 id="funcao-lider">Informação</h1> -->
                    <h2 id="nome-lider">Buscando informação...</h2>
                    <p id="email-lider">Carregando...</p>
                </div>
            </div>

            <div class="d-botoes">
                <div class="d-select">
                    <!-- <h3>Bem-vindo, líder!</h3> -->
                    <select name="select-turma" id=""></select>
                </div>
                <button onclick="window.location.href='./Pages/LiderPags/notificacoes.html'" class="btn-notificacao"
                    id="btn-notificacoes">🔔 Notificações <span id="badge-notificacao"
                        style="display:none;"></span></button>
                <button onclick="window.location.href='./Pages/LiderPags/avisos.html'" class="btn-aviso">📌 Criar
                    aviso</button>
                <button onclick="window.location.href='./Pages/LiderPags/perfil-lider.html'" class="btn-perfil">👤 Meu
                    perfil</button>
                <button onclick="window.location.href = './Pages/LiderPags/cadastroaluno.html'" class="btn-cadastro">
                    Cadastros</button>
            </div>

            <div class="grafico-container">
                <canvas id="graficoPresencaFaltas"></canvas>
            </div>


            <div class="dados-alunos">
                <div class="circle c1">
                    <h4>Turmas</h4>
                    <p style="color: rgb(0, 0, 0)" id="total-turmas"></p>
                </div>

                <div class="circle">
                    <h4>Alunos</h4>
                    <p style="color: rgb(0, 0, 0)" id="total-alunos"></p>
                </div>

                <div class="circle c3">
                    <h4>Cursos</h4>
                    <p style="color: rgb(0, 0, 0)" id="total-cursos"></p>
                </div>
            </div>

            <div class="dados-porcentagem">
                <div class="circle">
                    <h4>Presenças hoje</h4>
                    <p id="presencas-hoje" style="color: rgb(0, 98, 0); font-weight: bolder;"></p>
                    <small id="presencas-variacao">—</small>
                </div>

                <div class="circle">
                    <h4>Faltas hoje</h4>
                    <p id="faltas-hoje" style="color: rgb(255, 6, 6); font-weight: bolder;"></p>
                    <small id="faltas-variacao">—</small>
                </div>
            </div>

            <button class="btnDashboard" onclick="window.location.href='./Pages/LiderPags/dashboard.html'">
                📊 Ver gráficos
            </button>

            <div class="config-horario">
                <h2>Receber presenças</h2>
                <label for="hora-inicio">Início:</label>
                <input type="time" id="hora-inicio">
                <label for="hora-fim">Fim:</label>
                <input type="time" id="hora-fim">
                <button id="btn-salvar-horario">Salvar horário</button>
            </div>


            <div class="solicitacoes">
                <h2>Solicitações</h2>
                <div class="d-select">
                    <label for="filtro-tipo">Filtrar por tipo:</label>
                    <select id="filtro-tipo">
                        <option value="todos">Todos</option>
                        <!-- Opções serão preenchidas dinamicamente via JS -->
                    </select>
                </div>
                <div id="solicitacoes-alunos"></div>
            </div>
        </section>




        <section class="s-lista">
            <div class="d-nome-turma">
                <h2>Nome da turma</h2>
                <div class="funcionalidades-lista">
                    <input type="text" id="barraPesquisa" placeholder="Digite para filtrar alunos...">
                    <div class="btn-planilha">
                        <button id="btn-exportar-presenca">📊</button>
                        <input type="date" id="data-exportacao" max="" />
                    </div>
                </div>
            </div>

            <div id="scroll" class="scroll">
            </div>
        </section>
    </main>

    <script type="module" src="./JS/Líder/lider.js"></script>
    <script type="module" src="./JS/api.js"></script>
    <script type="module" src="./JS/Solicitações/solici-lider.js"></script>
    <script type="module" src="./JS/Líder/grafico.js"></script>
    <script type="module" src="./JS/Líder/grafico-alunos.js"></script>
    <script type="module" src="./JS/Perfil/dados-lider.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script type="module" src="./JS/Líder/export.js"></script>
    <script type="module" src="./JS/Líder/badge.js"></script>
</body>

</html>
